name: Mirror to Gitee
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Mirror to Gitee via HTTPS
        env:
          GITEE_USER: ${{ secrets.GITEE_USER }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config --global user.name "${GITEE_USER}"
          git config --global user.email "${GITEE_USER}@users.noreply.gitee.com"
          
          git remote add gitee https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/hl4w/noctalia-shell.git
          git push --prune gitee HEAD:main --force
