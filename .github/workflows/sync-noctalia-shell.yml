name: Sync Noctalia Shell Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * *'  # 每周日早上7点同步
  workflow_dispatch:    # 允许手动点一下同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main  # 这个项目默认分支是 main

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream repo
        run: |
          git remote add upstream https://github.com/noctalia-dev/noctalia-shell.git

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Merge upstream/main into your fork
        run: |
          git merge upstream/main --no-edit

      - name: Push to your GitHub
        run: |
          git push origin main
